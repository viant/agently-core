init:
  repoPath: $WorkingDirectory(../..)

pipeline:
  buildDatly:
    action: exec:run
    TimeoutMs: 180000
    checkError: true
    commands:
      - cd $repoPath
      - export PATH=/usr/local/go/bin:$PATH
      - export GOPATH=${env.GOPATH}
      - mkdir -p $repoPath/e2e/bin
      - go build -o $repoPath/e2e/bin/datly ./e2e/cli/datlycmd

  buildApp:
    action: exec:run
    TimeoutMs: 180000
    checkError: true
    commands:
      - cd $repoPath
      - export PATH=/usr/local/go/bin:$PATH
      - export GOPATH=${env.GOPATH}
      - mkdir -p $repoPath/e2e/bin
      - go build -o $repoPath/e2e/bin/agently-app ./e2e/cli/agently-app

  build:
    action: exec:run
    TimeoutMs: 120000
    checkError: true
    commands:
      - cd $repoPath
      - export PATH=/usr/local/go/bin:$PATH
      - export GOPATH=${env.GOPATH}
      - mkdir -p $repoPath/e2e/bin
      - cd ${repoPath}/e2e/cli/mcpserver
      - go build -o mcpserver
      - cp mcpserver $repoPath/e2e/bin/mcp-resources
      - cp mcpserver $repoPath/e2e/bin/mcp-elicitation-form
      - cp mcpserver $repoPath/e2e/bin/mcp-elicitation-oob
      - cp mcpserver $repoPath/e2e/bin/mcp-approval-tool
