pipeline:

  buildSchema:
    when: "$HasResource('${repoPath}/e2e/database/agently/agently.sql'):false"

    initializeAgently:
      action: dsunit:init
      description: register data store db with mysql dsn
      datastore: agently
      config:
        driver: mysql
        dsn: '${dbIP.user}:${dbIP.password}@tcp(${dbIP.mysql}:${dbPort.mysql})/agently?parseTime=true'
        credentials: $mysqlCred
      admin:
        datastore: mysql
        ping: true
        config:
          driver: mysql
          dsn: '${dbIP.user}:${dbIP.password}@tcp(${dbIP.mysql}:${dbPort.mysql})/[dbname]?parseTime=true'
          credentials: $mysqlCred
      scripts:
        - URL: ${repoPath}/e2e/database/agently/script/init.ddl
        - URL: ${repoPath}/e2e/database/agently/script/schema.ddl

    dumpMysqlSchemaDB:
      target: $target
      action: exec:run
      checkError: true
      init:
        dbname: agently
      systemPaths:
        - /usr/local/mysql/bin/
        - /usr/local/bin/
        - /usr/bin
      secrets:
        mydb: $mysqlCred
      commands:
        - echo 'starting ${dbname} backup'
        - docker exec  -i mysql_agently_core  mysqldump  -uroot -p${mydb.password} agently > ${repoPath}/e2e/database/agently/agently.sql

  sleep:
    action: nop
    description: Sleep before applyAgentlySchema
    sleepTimeMs: 5000

  applyAgentlySchema:
    action: exec:run
    target: $target
    checkErrors: true
    checkError: true
    init:
      dbname: agently
    systemPaths:
      - /usr/local/mysql/bin/
      - /usr/local/bin
      - /usr/bin
    secrets:
      mydb: $mysqlCred
    commands:
      - echo 'starting agently schema load'
      - until docker exec -i mysql_agently_core mysqladmin ping -h127.0.0.1 -uroot -p${mydb.password} --silent; do echo 'waiting for mysql...'; sleep 1; done
      - docker exec  -i mysql_agently_core  mysql -uroot -p${mydb.password}  < ${repoPath}/e2e/database/agently/script/init.ddl
      - docker exec  -i mysql_agently_core  mysql -uroot -p${mydb.password} agently < ${repoPath}/e2e/database/agently/agently.sql
