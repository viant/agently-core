pipeline:

  syncSchema:
    action: storage:copy
    source:
      URL: ${repoPath}/script/mysql/schema_versioned.ddl
    dest:
      URL: ${repoPath}/e2e/database/agently/script/schema.ddl

  waitForMysql:
    action: exec:run
    target: $target
    checkErrors: true
    checkError: true
    systemPaths:
      - /usr/local/mysql/bin/
      - /usr/local/bin
      - /usr/bin
    secrets:
      mydb: $mysqlCred
    commands:
      - echo 'waiting for mysql_agently_core readiness'
      - for i in {1..90}; do if docker exec mysql_agently_core mysqladmin ping -h127.0.0.1 --protocol=tcp -uroot -p${mydb.password} --silent >/dev/null 2>&1; then echo "mysql_agently_core is ready after ${i} attempt(s)"; break; fi; if [ "$i" = "90" ]; then echo 'mysql_agently_core did not become ready in time'; exit 1; fi; sleep 2; done

  applyAgentlySchema:
    action: exec:run
    target: $target
    checkErrors: true
    checkError: true
    init:
      dbname: agently
    systemPaths:
      - /usr/local/mysql/bin/
      - /usr/local/bin
      - /usr/bin
    secrets:
      mydb: $mysqlCred
    commands:
      - echo 'starting agently schema load from script/mysql/schema_versioned.ddl'
      - docker exec -i mysql_agently_core mysql -h127.0.0.1 --protocol=tcp -uroot -p${mydb.password} -e "DROP DATABASE IF EXISTS agently"
      - docker exec -i mysql_agently_core mysql -h127.0.0.1 --protocol=tcp -uroot -p${mydb.password} < ${repoPath}/e2e/database/agently/script/init.ddl
      - docker exec -i mysql_agently_core mysql -h127.0.0.1 --protocol=tcp -uroot -p${mydb.password} < ${repoPath}/e2e/database/agently/script/schema.ddl
