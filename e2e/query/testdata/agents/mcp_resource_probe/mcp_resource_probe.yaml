id: mcp_resource_probe
name: MCP Resource Probe
description: Agent that must call the MCP resource probe tool before responding.
modelRef: openai_gpt4o_mini
temperature: 0
persona:
  role: assistant
  actor: MCPResourceProbe
prompt:
  uri: prompt/user.tmpl
systemPrompt:
  uri: prompt/system.tmpl
tool:
  items:
    - pattern: "mcpres"
      type: function
