pipeline:
  createConversation:
    when: $sdkKey != ''
    action: http/runner:send
    description: "auto agent selection - create conversation with explicit agent"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/conversations
        JSONBody:
          AgentID: knowledge_system
          Title: auto-agent-selection-e2e
        Expect:
          Code: 200
          JSONBody:
            "@exists@Id": true

  autoAgentSelect:
    when: $sdkKey != ''
    action: http/runner:send
    description: "auto agent selection - continue with AgentID auto"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/agent/query
        Header:
          Connection: [close]
        JSONBody:
          ConversationID: ${createConversation.Responses[0].JSONBody.Id}
          AgentID: auto
          Query: summarize the previous guidance in one sentence
          UserId: e2e-auto-agent-selection
        Expect:
          Code: 200
          JSONBody:
            "@exists@conversationId": true
