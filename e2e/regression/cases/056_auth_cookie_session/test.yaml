pipeline:
  localLogin:
    action: http/runner:send
    description: "auth - local login to create session cookie"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/api/auth/local/login
        JSONBody:
          username: e2e-cookie-user
        Expect:
          Code: 200

  conversationsWithCookie:
    action: http/runner:send
    description: "auth - access protected endpoint with session cookie"
    requests:
      - Method: GET
        URL: ${serverURL}/v1/conversations
        Cookies:
          - Name: agently_session
            Value: ${localLogin.Responses[0].Cookies.agently_session}
        Expect:
          Code: 200

  meWithCookie:
    action: http/runner:send
    description: "auth - /v1/api/auth/me with session cookie returns user"
    requests:
      - Method: GET
        URL: ${serverURL}/v1/api/auth/me
        Cookies:
          - Name: agently_session
            Value: ${localLogin.Responses[0].Cookies.agently_session}
        Expect:
          Code: 200
          JSONBody:
            subject: e2e-cookie-user
