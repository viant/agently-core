pipeline:
  toolUsage:
    when: $sdkKey != ''
    action: http/runner:send
    description: "tool usage - execute system/os:getEnv directly"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/tools/execute
        JSONBody:
          name: system/os:getEnv
          args:
            names:
              - OPENAI_API_KEY
        Expect:
          Code: 200
          JSONBody:
            "@exists@result": true
