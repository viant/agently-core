pipeline:
  toolUsage:
    when: $sdkKey != ''
    action: http/runner:send
    description: "agent tool usage - os env variables"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/agent/query
        JSONBody:
          AgentID: tool_user
          Query: What is the value of the OPENAI_API_KEY environment variable? Just tell me if it exists or not and the first 10 characters.
          UserId: e2e-test
        Expect:
          Code: 200
          JSONBody:
            "@exists@conversationId": true
            "@exists@content": true
