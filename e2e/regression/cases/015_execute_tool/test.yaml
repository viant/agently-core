pipeline:
  executeTool:
    action: http/runner:send
    description: "execute tool - getEnv PATH"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/tools/system%2Fos%3AgetEnv/execute
        JSONBody:
          names:
            - PATH
        Expect:
          Code: 200
          JSONBody:
            "@exists@result": true
