pipeline:
  # ── reject branch ──────────────────────────────────────────────

  createConversationReject:
    when: $sdkKey != ''
    action: http/runner:send
    description: "tool approval prompt reject - create conversation"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/conversations
        JSONBody:
          AgentID: approval_prompt_probe
          Title: prompt-approval-reject-e2e
        Expect:
          Code: 200
          JSONBody:
            "@exists@Id": true

  startQueryReject:
    when: $sdkKey != ''
    action: http/runner:send
    description: "tool approval prompt reject - start query"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/agent/query
        Header:
          Connection: [close]
        JSONBody:
          ConversationID: ${createConversationReject.Responses[0].JSONBody.Id}
          AgentID: approval_prompt_probe
          UserId: e2e-prompt-reject
          Query: run the approval test tool

  waitForElicitationReject:
    when: $sdkKey != ''
    action: nop
    sleepTimeMs: 3000

  listElicitationsReject:
    when: $sdkKey != ''
    action: http/runner:send
    description: "tool approval prompt reject - verify elicitation appeared"
    requests:
      - Method: GET
        URL: ${serverURL}/v1/elicitations/pending?conversationId=${createConversationReject.Responses[0].JSONBody.Id}
        Expect:
          Code: 200
          JSONBody:
            "@exists@data[0]": true

  rejectToolApproval:
    when: $sdkKey != ''
    action: http/runner:send
    description: "tool approval prompt reject - decline the elicitation"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/conversations/${createConversationReject.Responses[0].JSONBody.Id}/elicitation/${listElicitationsReject.Responses[0].JSONBody.data[0].elicitationId}/resolve
        JSONBody:
          action: decline
          reason: e2e rejection test
        Expect:
          Code: 200

  # ── cancel branch ──────────────────────────────────────────────

  createConversationCancel:
    when: $sdkKey != ''
    action: http/runner:send
    description: "tool approval prompt cancel - create conversation"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/conversations
        JSONBody:
          AgentID: approval_prompt_probe
          Title: prompt-approval-cancel-e2e
        Expect:
          Code: 200
          JSONBody:
            "@exists@Id": true

  startQueryCancel:
    when: $sdkKey != ''
    action: http/runner:send
    description: "tool approval prompt cancel - start query"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/agent/query
        Header:
          Connection: [close]
        JSONBody:
          ConversationID: ${createConversationCancel.Responses[0].JSONBody.Id}
          AgentID: approval_prompt_probe
          UserId: e2e-prompt-cancel
          Query: run the approval test tool

  waitForElicitationCancel:
    when: $sdkKey != ''
    action: nop
    sleepTimeMs: 3000

  listElicitationsCancel:
    when: $sdkKey != ''
    action: http/runner:send
    description: "tool approval prompt cancel - verify elicitation appeared"
    requests:
      - Method: GET
        URL: ${serverURL}/v1/elicitations/pending?conversationId=${createConversationCancel.Responses[0].JSONBody.Id}
        Expect:
          Code: 200
          JSONBody:
            "@exists@data[0]": true

  cancelToolApproval:
    when: $sdkKey != ''
    action: http/runner:send
    description: "tool approval prompt cancel - cancel the elicitation"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/conversations/${createConversationCancel.Responses[0].JSONBody.Id}/elicitation/${listElicitationsCancel.Responses[0].JSONBody.data[0].elicitationId}/resolve
        JSONBody:
          action: cancel
        Expect:
          Code: 200
