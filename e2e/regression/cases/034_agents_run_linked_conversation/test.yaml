pipeline:
  runDelegation:
    when: $sdkKey != ''
    action: http/runner:send
    TimeoutMs: 240000
    description: "agents-run link - execute delegated run"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/agent/query
        Header:
          Connection: [close]
        JSONBody:
          AgentID: tool_forcer_agents_run
          UserId: e2e-test
          Query: Delegate once using llm/agents:run.
        Expect:
          Code: 200
          JSONBody:
            "@exists@conversationId": true

  verifyLinkedToolMessage:
    when: $sdkKey != ''
    action: http/runner:send
    description: "agents-run link - parent transcript includes linked conversation id"
    requests:
      - Method: GET
        URL: ${serverURL}/v1/messages?conversationId=${runDelegation.Responses[0].JSONBody.conversationId}&types=tool_op
        Expect:
          Code: 200
          JSONBody:
            "@exists@Rows[0].LinkedConversationId": true

  verifyChildConversation:
    when: $sdkKey != ''
    action: exec:run
    description: "agents-run link - linked child conversation exists"
    checkError: true
    commands:
      - |
        python3 - <<'PY'
        import json
        import sys
        import urllib.request

        server_url = "${serverURL}"
        parent_conversation_id = "${runDelegation.Responses[0].JSONBody.conversationId}"
        tool_messages_url = f"{server_url}/v1/messages?conversationId={parent_conversation_id}&types=tool_op"
        with urllib.request.urlopen(tool_messages_url) as response:
            payload = json.load(response)
        rows = payload.get("Rows") or []
        if not rows:
            raise SystemExit("no tool_op rows returned")
        linked_conversation_id = str(rows[0].get("LinkedConversationId") or "").strip()
        if not linked_conversation_id:
            raise SystemExit("linked conversation id missing")

        child_url = f"{server_url}/v1/conversations/{linked_conversation_id}"
        with urllib.request.urlopen(child_url) as response:
            child_payload = json.load(response)
        if not isinstance(child_payload, dict) or not str(child_payload.get("Id") or "").strip():
            raise SystemExit("child conversation payload missing Id")
        print(linked_conversation_id)
        PY
