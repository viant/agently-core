pipeline:
  knowledge:
    when: $sdkKey != ''
    action: http/runner:send
    description: "agent knowledge - local knowledge retrieval"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/agent/query
        JSONBody:
          AgentID: knowledge_local
          Query: What products does Viant make?
          UserId: e2e-test
        Expect:
          Code: 200
          JSONBody:
            "@exists@conversationId": true
            content: /atly/
