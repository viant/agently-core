pipeline:
  createConversation:
    when: $sdkKey != ''
    action: http/runner:send
    description: "streaming - create conversation"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/conversations
        JSONBody:
          AgentID: simple
          Title: stream-test
        Expect:
          Code: 200
          JSONBody:
            "@exists@Id": true

  query:
    when: $sdkKey != ''
    action: http/runner:send
    description: "streaming - query conversation"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/agent/query
        Header:
          Connection: [close]
        JSONBody:
          AgentID: simple
          ConversationID: ${createConversation.Responses[0].JSONBody.Id}
          Query: Say hello
          UserId: e2e-test
        Expect:
          Code: 200
          JSONBody:
            "@exists@content": true
