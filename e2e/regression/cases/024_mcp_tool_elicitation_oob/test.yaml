pipeline:
  executeOOBTool:
    when: $sdkKey != ''
    action: exec:run
    checkError: true
    description: "mcp oob tool - direct MCP tool execution should succeed"
    commands:
      - >-
        resp=$(curl -sS -X POST ${serverURL}/v1/tools/execute
        -H "Content-Type: application/json"
        -d '{"name":"mcpoob/ask_oob","args":{}}') &&
        echo "$resp" &&
        echo "$resp" | grep -q '"mode":"elicitation_oob"' &&
        echo "$resp" | grep -q '"action":"accept"'
