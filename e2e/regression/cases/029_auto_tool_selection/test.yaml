pipeline:
  createConversation:
    when: $sdkKey != ''
    action: http/runner:send
    description: "auto tool selection - create conversation"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/conversations
        JSONBody:
          AgentID: tool_exposure_probe
          Title: auto-tool-selection-e2e
        Expect:
          Code: 200
          JSONBody:
            "@exists@Id": true

  startAutoToolSelect:
    when: $sdkKey != ''
    action: http/runner:send
    description: "auto tool selection - run query"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/agent/query
        Header:
          Connection: [close]
        JSONBody:
          ConversationID: ${createConversation.Responses[0].JSONBody.Id}
          AgentID: tool_exposure_probe
          Query: CALL_TOOL
          UserId: e2e-test
          AutoSelectTools: true

  waitAutoToolSelect:
    when: $sdkKey != ''
    action: nop
    sleepTimeMs: 500

  verifyToolCall:
    when: $sdkKey != ''
    action: http/runner:send
    description: "auto tool selection - query should produce a tool_op"
    requests:
      - Method: GET
        URL: ${serverURL}/v1/messages?conversationId=${createConversation.Responses[0].JSONBody.Id}&types=tool_op
        Expect:
          Code: 200
          JSONBody:
            "@exists@Rows[0]": true
