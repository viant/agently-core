pipeline:
  createConversation:
    when: $sdkKey != ''
    action: http/runner:send
    description: "tool approval queue + elicitation - create conversation"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/conversations
        JSONBody:
          AgentID: mcp_form_queue_probe
          Title: queue-elicitation
        Expect:
          Code: 200
          JSONBody:
            "@exists@Id": true

  startQueuedToolQuery:
    when: $sdkKey != ''
    action: http/runner:send
    description: "tool approval queue + elicitation - start query that should queue MCP form tool"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/agent/query
        Header:
          Connection: [close]
        JSONBody:
          ConversationID: ${createConversation.Responses[0].JSONBody.Id}
          AgentID: mcp_form_queue_probe
          UserId: e2e-queue-user
          Query: collect my favorite color through the form tool

  waitPendingToolApproval:
    when: $sdkKey != ''
    action: nop
    sleepTimeMs: 3000

  waitUntilPendingToolApproval:
    when: $sdkKey != ''
    action: http/runner:send
    description: "tool approval queue + elicitation - wait until pending approval appears"
    requests:
      - Method: GET
        URL: ${serverURL}/v1/tool-approvals/pending?userId=e2e-queue-user&conversationId=${createConversation.Responses[0].JSONBody.Id}
        Expect:
          Code: 200
          JSONBody:
            "@exists@rows[0]": true
