pipeline:
  executeResourceTool:
    when: $sdkKey != ''
    action: http/runner:send
    description: "mcp resource - direct MCP tool execution should succeed"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/tools/execute
        JSONBody:
          name: mcpres/resource_probe
          args: {}
        Expect:
          Code: 200
          JSONBody:
            "@exists@result": true
