pipeline:
  createConversation:
    when: $sdkKey != ''
    action: http/runner:send
    description: "auto-summarize - create conversation"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/conversations
        JSONBody:
          AgentID: auto_summarize
          Title: auto-summarize-e2e
        Expect:
          Code: 200
          JSONBody:
            "@exists@Id": true

  query:
    when: $sdkKey != ''
    action: http/runner:send
    description: "auto-summarize - query"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/agent/query
        Header:
          Connection: [close]
        JSONBody:
          ConversationID: ${createConversation.Responses[0].JSONBody.Id}
          Query: Tell me about the benefits of regular exercise.
          UserId: e2e-test
        Expect:
          Code: 200
          JSONBody:
            "@exists@content": true

  getConversation:
    when: $sdkKey != ''
    action: http/runner:send
    description: "auto-summarize - verify title set"
    requests:
      - Method: GET
        URL: ${serverURL}/v1/conversations/${createConversation.Responses[0].JSONBody.Id}
        Expect:
          Code: 200
          JSONBody:
            "@exists@Id": true
            "@exists@Title": true
