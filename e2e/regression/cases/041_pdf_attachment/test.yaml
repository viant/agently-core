pipeline:
  query:
    when: $sdkKey != ''
    action: http/runner:send
    description: "openai_responses_pdf_attachment - extract deterministic token"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/agent/query
        Header:
          Connection: [close]
        JSONBody:
          AgentID: pdf_inline
          Query: What exact token appears in the attached PDF? Answer only with the token.
          UserId: e2e-pdf
          attachments:
            - name: token.pdf
              mime: application/pdf
              data: 
        Expect:
          Code: 200
          JSONBody:
            "@exists@conversationId": true
            content: PDF_TEST_TOKEN_4729

  transcript:
    when: $sdkKey != ''
    action: http/runner:send
    description: "openai_responses_pdf_attachment - transcript exposes attachment on user task message"
    requests:
      - Method: GET
        URL: ${serverURL}/v1/conversations/${query.Responses[0].JSONBody.conversationId}/transcript
        Expect:
          Code: 200
          Body: /application/pdf/

  attachmentMessage:
    when: $sdkKey != ''
    action: http/runner:send
    description: "openai_responses_pdf_attachment - attachment control message is persisted"
    requests:
      - Method: GET
        URL: ${serverURL}/v1/messages?conversationId=${query.Responses[0].JSONBody.conversationId}&roles=user&types=control
        Expect:
          Code: 200
          JSONBody:
            "@exists@Rows[0].AttachmentPayloadId": true
            "@exists@Rows[0].Content": true

  attachmentPayload:
    when: $sdkKey != ''
    action: http/runner:send
    description: "openai_responses_pdf_attachment - payload metadata and inline body are retrievable"
    requests:
      - Method: GET
        URL: ${serverURL}/v1/api/payload/${attachmentMessage.Responses[0].JSONBody.Rows[0].AttachmentPayloadId}?inline=1
        Expect:
          Code: 200
          JSONBody:
            Id: ${attachmentMessage.Responses[0].JSONBody.Rows[0].AttachmentPayloadId}
            MimeType: application/pdf
            "@exists@InlineBody": true
