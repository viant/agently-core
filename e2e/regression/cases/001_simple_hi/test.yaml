pipeline:
  simpleHi:
    when: $sdkKey != ''
    action: http/runner:send
    description: "agent simple conversation - hi"
    requests:
      - Method: POST
        URL: ${serverURL}/v1/agent/query
        Header:
          Connection: [close]
        JSONBody:
          AgentID: "simple"
          Query: "Hi, how are you?"
          UserId: "e2e-test"
        Expect:
          Code: 200
          JSONBody:
            "@exists@conversationId": true
            "@exists@content": true
