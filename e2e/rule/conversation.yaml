pipeline:
  translate:
    action: exec:run
    TimeoutMs: 120000
    checkError: true
    commands:
      - cd $repoPath
      - $repoPath/e2e/bin/datly gen -o=get -u=agently/conversation      -s='dql/agently/conversation/conversation.dql' $datlyOptions
      - $repoPath/e2e/bin/datly gen -o=get -u=agently/conversation/list      -s='dql/agently/conversation/list.dql' $datlyOptions
