init:
  mysqlCred: mysql-e2e.json
  mysqlSecrets: ${secrets.$mysqlCred}
  repoPath: $WorkingDirectory(./..)
  appURL: http://127.0.0.1:8585
  testdataPath: ${repoPath}/e2e/query/testdata
  workspacePath: /tmp/agently-core-e2e-workspace/.agently
  serverPort: 8090
  serverURL: http://127.0.0.1:${serverPort}
  debugger: off
  sdkKey: ${env.OPENAI_API_KEY}
  dbIP:
    mysql: localhost
    user: ${mysqlSecrets.Username}
    password: ${mysqlSecrets.Password}
  dbPort:
    mysql: 3308
  connections: -c='agently|mysql|${dbIP.user}:${dbIP.password}@tcp(${dbIP.mysql}:${dbPort.mysql})/agently?parseTime=true'
  datlyOptions: $connections

pipeline:

  init:
    system:
      action: run
      description: init system
      request: '@system'

    database:
      action: run
      description: init database
      request: '@database/database'

  build:
    helpers:
      action: run
      description: build e2e helper binaries
      request: '@build/build'

  buildApp:
    ui:
      action: run
      description: build agently-app UI assets for embedding
      request: '@build/buildUI'
    binary:
      action: run
      description: build agently-app binary
      request: '@build/buildApp'

  prepareWorkspace:
    action: exec:run
    description: reset e2e workspace fixtures before app start
    checkError: true
    commands:
      - ${repoPath}/e2e/scripts/prepare_workspace.sh ${repoPath} ${workspacePath} ${testdataPath}

  app:
    action: run
    description: run agently-app host
    request: '@app/app'

  rule:
    cleanup:
      action: exec:run
      TimeoutMs: 120000
      checkError: true
      commands:
        - cd $repoPath
        - rm -rf repo/

    conversation:
      action: run
      request: '@rule/conversation'
    message:
      action: run
      request: '@rule/message'
    turn:
      action: run
      request: '@rule/turn'
    run:
      action: run
      request: '@rule/run'
    toolcall:
      action: run
      request: '@rule/toolcall'
    payload:
      action: run
      request: '@rule/payload'
    toolApprovalQueue:
      action: run
      request: '@rule/tool_approval_queue'

  test:
    action: run
    description: run e2e regression tests
    request: '@regression/regression'
