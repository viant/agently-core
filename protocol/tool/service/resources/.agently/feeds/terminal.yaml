id: terminal
match:
  service: system/exec
  method: execute

activation:
  kind: history


dataSource:
  output:
    source: output
    merge: merge_object
    exposeAs: output
  commands:
    root: true
    merge: append
    uniqueKey:
      - field: input
      - field: output
    source: output.commands

countSource: commands


ui:
  id: commands
  title: Terminal
  terminal:
    dataSourceRef: commands
    height: 25
    autoScroll: true
