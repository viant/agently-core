id: performance_analysis
name: Performance Analysis
description: "Use when the user asks about system health or performance trends."
appliesTo:
  - performance
  - health
evidenceContract:
  required:
    - hierarchy
    - pacing_campaign
  optional:
    - audience_delivery
  forbidden:
    - recommendation_only
  completion:
    - emit DATA:hierarchy
    - emit at least one pacing block
messages:
  - role: system
    text: $import(../shared/system.txt)
  - role: user
    text: $import(../shared/user.txt)
toolBundles:
  - analyst-performance-tools
template: analytics_dashboard
templates:
  - analytics_dashboard
  - resource_list_review
