id: spo_planner_submit
description: Persist user-selected KEEP/REVIEW/REMOVE decisions for team review.
tool: analyst-SaveDecision
payload:
  body: |
    {
      "Body": {
        "id": "rec-{{default "0" .agencyId}}-decision-{{.today}}",
        "account_id": {{default "0" .agencyId}},
        "source_agent": "data-analyst/inventory_review",
        "category": "curation",
        "severity": "medium",
        "title": "Decision review",
        "recommendation": "Applied selected decisions from dashboard.",
        "conversation_id": "{{.conversationId}}",
        "supporting_metrics": {{json .selectedRows}}
      }
    }
