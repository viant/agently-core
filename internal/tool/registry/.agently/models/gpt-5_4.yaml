id: openai_gpt-5.4
name: gpt-5.4 (OpenAI)
description: OpenAI gpt-5.4 model
intelligence: 0.96
speed: 0.9
options:
  provider: openai
  model: gpt-5.4
  envKey: OPENAI_API_KEY
  maxTokens: 128000
  inputTokenPrice: 0.0025    # $2.50 per 1M tokens ($0.0025 per 1K)
  cachedTokenPrice: 0.00025  # $0.25 per 1M tokens ($0.00025 per 1K)
  outputTokenPrice: 0.015    # $15 per 1M tokens ($0.015 per 1K)
  contextContinuation: true
  enableContinuationFormat: false
